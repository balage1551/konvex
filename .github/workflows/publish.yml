name: Publish

# Publishes both packages to npm using OIDC "trusted publishing" — no npm token
# is stored in the repo. npm verifies the request came from this exact workflow
# (configured per-package at npmjs.com › Package settings › Trusted Publisher).
#
# Trigger by publishing a GitHub Release (recommended: tag it v1.0.0), or run it
# manually from the Actions tab.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # REQUIRED: lets the job mint the OIDC token npm exchanges for publish auth

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: no `registry-url` here on purpose. Setting it makes setup-node write
      # an .npmrc with `_authToken=${NODE_AUTH_TOKEN}`; with no token that expands
      # to an empty credential, which npm treats as "auth already configured" and
      # SKIPS the OIDC exchange — publishing then fails with a 404. Trusted
      # publishing uses the default registry (registry.npmjs.org) anyway.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Trusted publishing needs npm >= 11.5.1; pin to the validated 11.x line.
      - run: npm install -g npm@11

      - run: npm ci

      # Builds core first, then editable-line (order matters — see root build script).
      - run: npm run build

      # Publish each package, core first. Idempotent: a version already on the
      # registry is skipped, so re-runs and partial retries are safe. No
      # NODE_AUTH_TOKEN — auth is the OIDC token (id-token: write); --provenance
      # attaches a signed build-provenance attestation.
      - name: Publish @balage1551/konvex
        run: |
          v=$(node -p "require('./packages/konvex/package.json').version")
          if npm view "@balage1551/konvex@$v" version >/dev/null 2>&1; then
            echo "@balage1551/konvex@$v already published — skipping."
          else
            npm publish -w @balage1551/konvex --provenance --access public
          fi
      - name: Publish @balage1551/konvex-editable-line
        run: |
          v=$(node -p "require('./packages/konvex-editable-line/package.json').version")
          if npm view "@balage1551/konvex-editable-line@$v" version >/dev/null 2>&1; then
            echo "@balage1551/konvex-editable-line@$v already published — skipping."
          else
            npm publish -w @balage1551/konvex-editable-line --provenance --access public
          fi

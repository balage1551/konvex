name: Publish

# Publishes both packages to npm using OIDC "trusted publishing" — no npm token
# is stored in the repo. npm verifies the request came from this exact workflow
# (configured per-package at npmjs.com › Package settings › Trusted Publisher).
#
# Trigger by publishing a GitHub Release (recommended: tag it v1.0.0), or run it
# manually from the Actions tab.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # REQUIRED: lets the job mint the OIDC token npm exchanges for publish auth

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: no `registry-url` here on purpose. Setting it makes setup-node write
      # an .npmrc with `_authToken=${NODE_AUTH_TOKEN}`; with no token that expands
      # to an empty credential, which npm treats as "auth already configured" and
      # SKIPS the OIDC exchange — publishing then fails with a 404. Trusted
      # publishing uses the default registry (registry.npmjs.org) anyway.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Trusted publishing needs npm >= 11.5.1; Node 24 ships a recent npm, and we
      # upgrade to be sure. Print the version so the log proves which npm published.
      - run: npm install -g npm@latest && npm --version

      - run: npm ci

      # Builds core first, then editable-line (order matters — see root build script).
      - run: npm run build

      # No NODE_AUTH_TOKEN: auth comes from the OIDC token via id-token: write.
      # --provenance publishes a signed provenance attestation alongside each package.
      - run: npm publish -w @balage1551/konvex --provenance --access public
      - run: npm publish -w @balage1551/konvex-editable-line --provenance --access public
